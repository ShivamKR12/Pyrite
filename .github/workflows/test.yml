name: Engine Tests

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        pip install -r requirements-dev.txt

    - name: Run Tests
      run: |
        pytest --cov=src --cov-report=term-missing tests/
