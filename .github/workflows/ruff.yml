name: Ruff Code Quality

on:
  push:
    paths:
      - '**.py'
      - 'pyproject.toml'
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Ruff
      run: pip install -r requirements-dev.txt

    - name: Check formatting with Ruff
      run: ruff format --check .
      
    - name: Lint with Ruff
      run: ruff check .
