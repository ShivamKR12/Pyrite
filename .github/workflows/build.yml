name: Build Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch: # Allows you to manually click a "Build" button on GitHub!

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches all history so tag lookups map cleanly

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Build Executable via PyInstaller
      run: |
        pyinstaller build.spec

    - name: Zip Executable (Windows)
      if: runner.os == 'Windows'
      run: Compress-Archive -Path dist/Pyrite -DestinationPath Pyrite_${{ runner.os }}.zip

    - name: Zip Executable (Linux & macOS)
      if: runner.os != 'Windows'
      run: cd dist && zip -r ../Pyrite_${{ runner.os }}.zip Pyrite/

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: Pyrite_${{ runner.os }}.zip
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
