name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch: # Allows you to manually click a "Build" button on GitHub!

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt pyinstaller
        
    - name: Build & Zip Executable
      run: |
        pyinstaller build.spec
        Compress-Archive -Path dist/Pyrite -DestinationPath Pyrite_Windows.zip
        
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: Pyrite_Windows.zip